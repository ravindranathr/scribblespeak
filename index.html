<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ScribbleSpeak - Handwriting to Speech PWA</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="A premium Progressive Web App (PWA) that converts handwriting into speech using state-of-the-art canvas drawing, real-time handwriting recognition APIs, and local offline text-to-speech with word highlighting.">
  <meta name="theme-color" content="#f8fafc">
  
  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- App Header -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <i class="fas fa-feather-alt"></i>
      </div>
      <div>
        <h1>ScribbleSpeak</h1>
        <div class="subtitle">Calligraphy to Voice Reader</div>
      </div>
    </div>
    
    <div class="toolbar">
      <!-- PWA Installation Banner Button -->
      <button id="pwa-install-btn" class="btn" style="display: none;">
        <i class="fas fa-download"></i> Install App
      </button>
      
      <!-- Open Settings Drawer Button -->
      <button id="btn-open-settings" class="btn" title="Open App Settings">
        <i class="fas fa-cog"></i> Settings
      </button>
      
      <!-- Network Connection Badge -->
      <div id="network-badge" class="status-badge online">
        <span class="badge-indicator"></span>
        <span id="network-status-text">Online Mode</span>
      </div>
    </div>
  </header>

  <!-- Main Grid App Container -->
  <main class="app-container">
    
    <!-- LEFT PANEL: Handwriting Workspace (Bigger Canvas!) -->
    <section class="panel" id="handwriting-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fas fa-pen-fancy"></i>
          <span>Handwriting Workspace</span>
        </div>
        
        <div class="toolbar">
          <!-- Auto Recognition Toggler -->
          <button id="auto-recognize-toggle" class="btn active" title="Convert handwriting automatically when you pause writing">
            <i class="fas fa-magic"></i> Auto Convert
          </button>
          
          <!-- Convert Action Button -->
          <button id="btn-recognize" class="btn btn-primary" title="Manually convert strokes to text">
            <i class="fas fa-sync-alt"></i> Convert to Text
          </button>
        </div>
      </div>
      
      <!-- The Drawing Canvas (Lighter paper-grid style default!) -->
      <div class="canvas-container ruled-paper" id="canvas-container-box">
        <canvas id="drawing-canvas"></canvas>
        
        <!-- Hover Overlay Canvas Controls (Ultra Clean & Minimalist!) -->
        <div class="canvas-overlay-controls">
          
          <!-- Subtle Ink Palette -->
          <div class="brush-color-picker">
            <div class="color-dot active" data-color="#1e293b" style="background: #1e293b;" title="Slate Ink"></div>
            <div class="color-dot" data-color="#1d4ed8" style="background: #1d4ed8;" title="Royal Blue"></div>
            <div class="color-dot" data-color="#15803d" style="background: #15803d;" title="Forest Green"></div>
            <div class="color-dot" data-color="#b91c1c" style="background: #b91c1c;" title="Crimson Red"></div>
            <div class="color-dot" data-color="#7c2d12" style="background: #7c2d12;" title="Espresso Brown"></div>
            <div class="color-dot" data-color="#4b5563" style="background: #4b5563;" title="Charcoal Grey"></div>
          </div>
          
          <div style="width: 1px; height: 20px; background: rgba(15, 23, 42, 0.08);"></div>
          
          <!-- Undo / Redo / Clear Actions -->
          <div style="display: flex; gap: 0.25rem;">
            <button id="btn-undo" class="btn" style="padding: 0.35rem 0.5rem;" title="Undo (Ctrl+Z)" disabled>
              <i class="fas fa-undo"></i>
            </button>
            <button id="btn-redo" class="btn" style="padding: 0.35rem 0.5rem;" title="Redo (Ctrl+Y)" disabled>
              <i class="fas fa-redo"></i>
            </button>
            <button id="btn-clear" class="btn" style="padding: 0.35rem 0.5rem;" title="Clear Canvas">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
          
        </div>
      </div>
    </section>
    
    <!-- RIGHT PANEL: Reader & Speech Control Dashboard -->
    <section class="panel" id="speech-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fas fa-volume-up"></i>
          <span>Voice Reader Engine</span>
        </div>
      </div>
      
      <div class="reader-container">
        
        <!-- Editable Text Area with Highlights Overlay -->
        <div class="text-editor-container">
          <div class="text-editor-label">
            <span>Transcribed Document Text</span>
            <div class="text-editor-actions">
              <button id="btn-copy" title="Copy Text to Clipboard">
                <i class="far fa-copy"></i> Copy
              </button>
            </div>
          </div>
          
          <div class="editor-wrapper">
            <div class="backdrop-container">
              <!-- Background div for highlighted glowing spans -->
              <div id="text-highlights" class="editor-highlights"></div>
              <!-- Editable foreground textarea -->
              <textarea id="text-editor" class="editor-textarea" placeholder="Transcribed handwriting will appear here. You can also type directly in this panel..."></textarea>
            </div>
          </div>
        </div>
        
        <!-- Play / Pause / Stop buttons -->
        <div class="control-buttons-grid">
          <button id="btn-speak" class="btn btn-primary" style="padding: 0.75rem 1rem;">
            <i class="fas fa-play"></i> Speak Aloud
          </button>
          <button id="btn-pause" class="btn" style="border: 1px solid var(--border-light); background: var(--bg-control);" disabled>
            <i class="fas fa-pause"></i> Pause
          </button>
          <button id="btn-stop" class="btn" style="border: 1px solid var(--border-light); background: var(--bg-control);" disabled>
            <i class="fas fa-stop"></i> Stop
          </button>
        </div>

        <!-- Speech Audio Visualizer -->
        <div class="visualizer-card">
          <div class="visualizer-status">
            <span id="visualizer-status-dot" class="status-dot"></span>
            <span id="visualizer-status-text">Idle</span>
          </div>
          
          <!-- Soundwave Animation Visualizer -->
          <div id="speech-wave" class="soundwave">
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
            <div class="soundwave-bar"></div>
          </div>
        </div>
        
      </div>
    </section>
  </main>

  <!-- Settings Drawer Panel -->
  <div id="settings-drawer" class="settings-drawer">
    <div class="drawer-header">
      <div class="drawer-title">
        <i class="fas fa-sliders-h"></i>
        <span>App Settings</span>
      </div>
      <button id="btn-close-settings" class="btn-close-drawer" title="Close Settings">
        <i class="fas fa-times"></i>
      </button>
    </div>
    
    <div class="drawer-content">
      
      <!-- Section 1: Handwriting Styles -->
      <div class="settings-section">
        <h3><i class="fas fa-pen-fancy"></i> Handwriting Options</h3>
        
        <div class="settings-row">
          <label for="language-select">Recognition Language</label>
          <select id="language-select" class="custom-select">
            <option value="en" selected>English</option>
            <option value="es">Español (Spanish)</option>
            <option value="fr">Français (French)</option>
            <option value="de">Deutsch (German)</option>
            <option value="it">Italiano (Italian)</option>
            <option value="pt">Português (Portuguese)</option>
            <option value="ru">Русский (Russian)</option>
            <option value="zh">中文 (Chinese)</option>
            <option value="ja">日本語 (Japanese)</option>
            <option value="hi">हिन्दी (Hindi)</option>
            <option value="ar">العربية (Arabic)</option>
          </select>
        </div>
        
        <div class="settings-row">
          <label for="pen-width">Pen Thickness Size</label>
          <select id="pen-width" class="custom-select">
            <option value="2">Fine</option>
            <option value="4" selected>Medium</option>
            <option value="7">Thick</option>
            <option value="12">Bold</option>
          </select>
        </div>
        
        <div class="settings-row">
          <label for="paper-grid">Paper Background grid</label>
          <select id="paper-grid" class="custom-select">
            <option value="ruled-paper" selected>Ruled Notepad</option>
            <option value="dot-grid">Dot Matrix</option>
            <option value="slate-dark">Slate Canvas</option>
          </select>
        </div>
      </div>
      
      <!-- Section 2: Speech Synthesizer -->
      <div class="settings-section">
        <h3><i class="fas fa-volume-up"></i> Voice Reader Settings</h3>
        
        <div class="settings-row">
          <label for="voice-select">Synthesizer Voice</label>
          <select id="voice-select" class="custom-select">
            <option>Loading system voices...</option>
          </select>
        </div>
        
        <div class="settings-row">
          <label for="rate-slider">Speed Speed <span id="rate-value">1x</span></label>
          <input type="range" id="rate-slider" min="0.5" max="2.5" step="0.1" value="1">
        </div>
        
        <div class="settings-row">
          <label for="pitch-slider">Pitch Tone <span id="pitch-value">1</span></label>
          <input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1">
        </div>
        
        <div class="settings-row">
          <label for="volume-slider">Volume Level <span id="volume-value">100%</span></label>
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
        </div>
      </div>
      
    </div>
  </div>

  <!-- JavaScript Libraries and Coordinates -->
  <script src="js/canvas.js"></script>
  <script src="js/recognizer.js"></script>
  <script src="js/app.js"></script>
  <script src="js/register-sw.js"></script>
</body>
</html>
