<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ScribbleSpeak - Handwriting to Speech PWA</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="A premium Progressive Web App (PWA) that converts handwriting into speech using state-of-the-art canvas drawing, real-time handwriting recognition APIs, and local offline text-to-speech with word highlighting.">
  <meta name="theme-color" content="#f8fafc">
  
  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- App Header -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <i class="fas fa-feather-alt"></i>
      </div>
      <div>
        <h1>ScribbleSpeak</h1>
        <div class="subtitle">Calligraphy to Voice Reader</div>
      </div>
    </div>
    
    <div class="toolbar">
      <!-- PWA Installation Banner Button -->
      <button id="pwa-install-btn" class="btn" style="display: none;">
        <i class="fas fa-download"></i> Install App
      </button>
      
      <!-- Network Connection Badge -->
      <div id="network-badge" class="status-badge online">
        <span class="badge-indicator"></span>
        <span id="network-status-text">Online Mode</span>
      </div>
    </div>
  </header>

  <!-- Main 100% Width Canvas App Container -->
  <main class="app-container">
    
    <!-- LEFT PANEL: Handwriting Workspace (100% Full Screen Canvas!) -->
    <section class="panel" id="handwriting-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fas fa-pen-fancy"></i>
          <span>Handwriting Canvas</span>
        </div>
        
        <div class="toolbar">
          <!-- Auto Recognition Toggler -->
          <button id="auto-recognize-toggle" class="btn active" title="Convert handwriting automatically when you pause writing">
            <i class="fas fa-magic"></i> Auto Convert
          </button>
          
          <!-- Convert Action Button -->
          <button id="btn-recognize" class="btn btn-primary" title="Manually convert strokes to text">
            <i class="fas fa-sync-alt"></i> Convert to Text
          </button>
        </div>
      </div>
      
      <!-- The Drawing Canvas -->
      <div class="canvas-container ruled-paper" id="canvas-container-box">
        <canvas id="drawing-canvas"></canvas>
        
        <!-- Hover Overlay Canvas Controls (Ultra Clean & Minimalist!) -->
        <div class="canvas-overlay-controls">
          
          <!-- Subtle Ink Palette -->
          <div class="brush-color-picker">
            <div class="color-dot active" data-color="#1e293b" style="background: #1e293b;" title="Slate Ink"></div>
            <div class="color-dot" data-color="#1d4ed8" style="background: #1d4ed8;" title="Royal Blue"></div>
            <div class="color-dot" data-color="#15803d" style="background: #15803d;" title="Forest Green"></div>
            <div class="color-dot" data-color="#b91c1c" style="background: #b91c1c;" title="Crimson Red"></div>
            <div class="color-dot" data-color="#7c2d12" style="background: #7c2d12;" title="Espresso Brown"></div>
            <div class="color-dot" data-color="#4b5563" style="background: #4b5563;" title="Charcoal Grey"></div>
          </div>
          
          <div style="width: 1px; height: 20px; background: rgba(15, 23, 42, 0.08);"></div>
          
          <!-- Undo / Redo / Clear Actions -->
          <div style="display: flex; gap: 0.25rem;">
            <button id="btn-undo" class="btn" style="padding: 0.35rem 0.5rem;" title="Undo (Ctrl+Z)" disabled>
              <i class="fas fa-undo"></i>
            </button>
            <button id="btn-redo" class="btn" style="padding: 0.35rem 0.5rem;" title="Redo (Ctrl+Y)" disabled>
              <i class="fas fa-redo"></i>
            </button>
            <button id="btn-clear" class="btn" style="padding: 0.35rem 0.5rem;" title="Clear Canvas">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
          
        </div>
      </div>
    </section>
  </main>

  <!-- JavaScript Libraries and Coordinates -->
  <script src="js/canvas.js"></script>
  <script src="js/recognizer.js"></script>
  <script src="js/app.js"></script>
  <script src="js/register-sw.js"></script>
</body>
</html>
